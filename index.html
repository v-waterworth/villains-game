<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Villains Among Us — Cast Your Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="game.css">
</head>
<body>
<div id="app" class="app"></div>
<div id="status" class="status-pill"><div class="status-dot"></div><span>Connecting</span></div>

<script type="module">
import { SESSION_ID, POLL_INTERVAL_VOTER } from './config.js';
import { VILLAINS, ROUNDS, matchupKey, villainCardHtml } from './game-core.js';

// ─── Voter ID (persistent per device) ─────────────────────────────────────
let voterId = localStorage.getItem('villainsVoterId');
if (!voterId) {
  voterId = 'v_' + Math.random().toString(36).substr(2, 10);
  localStorage.setItem('villainsVoterId', voterId);
}

// ─── Local state ──────────────────────────────────────────────────────────
let gameState = { phase: 'intro', roundIdx: 0, matchupIdx: 0 };
let lastStateSig = '';
let registered = false;

function getMyVote(key) {
  return localStorage.getItem(`villainsVote_${SESSION_ID}_${key}`) || null;
}

// ─── API helpers ──────────────────────────────────────────────────────────
async function fetchSession() {
  const res = await fetch(`/api/session?s=${encodeURIComponent(SESSION_ID)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function sendAction(body) {
  const res = await fetch('/api/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, s: SESSION_ID }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ─── Poll loop ────────────────────────────────────────────────────────────
async function poll() {
  try {
    // Register on first successful connect
    if (!registered) {
      try {
        await sendAction({ action: 'register', voterId });
        registered = true;
      } catch (_) { /* retry next poll */ }
    }

    const data = await fetchSession();
    gameState = data.state || { phase: 'intro', roundIdx: 0, matchupIdx: 0 };
    setStatus('connected');

    const sig = JSON.stringify(gameState);
    if (sig !== lastStateSig) {
      lastStateSig = sig;
      render();
    }
  } catch (err) {
    console.error('Poll failed:', err);
    setStatus('error');
  }
}

// ─── Vote handlers ────────────────────────────────────────────────────────
window.castVote = async function (villainId) {
  if (gameState.phase !== 'round') return;
  const key = matchupKey(gameState.roundIdx, gameState.matchupIdx);
  localStorage.setItem(`villainsVote_${SESSION_ID}_${key}`, villainId);
  render(); // optimistic
  try {
    await sendAction({ action: 'vote', matchupKey: key, voterId, villainId });
  } catch (err) {
    console.error(err);
    alert('Vote failed. Check your connection and try again.');
  }
};

window.castFinalVote = async function (villainId) {
  if (gameState.phase !== 'final') return;
  localStorage.setItem(`villainsVote_${SESSION_ID}_final`, villainId);
  render();
  try {
    await sendAction({ action: 'finalVote', voterId, villainId });
  } catch (err) {
    console.error(err);
    alert('Vote failed. Check your connection and try again.');
  }
};

// ─── Status indicator ─────────────────────────────────────────────────────
function setStatus(state) {
  const pill = document.getElementById('status');
  pill.className = 'status-pill ' + state;
  pill.querySelector('span').textContent =
    state === 'connected' ? 'Live' : state === 'error' ? 'Error' : 'Connecting';
}

// ─── Render ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  let html = '';
  switch (gameState.phase) {
    case 'intro':    html = renderIntro(); break;
    case 'round':    html = renderMatchup(); break;
    case 'roundEnd': html = renderRoundEnd(); break;
    case 'final':    html = renderFinal(); break;
    case 'results':  html = renderResults(); break;
    default:         html = renderIntro();
  }
  app.innerHTML = html;
  window.scrollTo(0, 0);
}

function renderIntro() {
  const galleryHtml = Object.keys(VILLAINS).map(id => villainCardHtml(id, { size: 'md' })).join('');
  return `
    <div class="screen">
      <div class="text-center max-w-4xl">
        <div class="intro-eyebrow">A Team Social Parlor Game</div>
        <h1 class="intro-title">THE VILLAINS</h1>
        <div class="intro-subtitle">Among Us</div>
        <p class="intro-blurb">
          Seven icons of fictional evil. Each round, you'll vote on who wins.
          The host will begin shortly — sit tight.
        </p>
        <div class="villain-gallery">${galleryHtml}</div>
        <div class="vote-cast-eyebrow" style="letter-spacing: 0.3em;">
          Waiting for the host to begin…
        </div>
      </div>
    </div>`;
}

function renderMatchup() {
  const round = ROUNDS[gameState.roundIdx];
  if (!round) return renderIntro();
  const matchup = round.matchups[gameState.matchupIdx];
  if (!matchup) return renderIntro();

  const key = matchupKey(gameState.roundIdx, gameState.matchupIdx);
  const myVote = getMyVote(key);
  const dotsHtml = round.matchups.map((_, i) => {
    const cls = i < gameState.matchupIdx ? 'done' : i === gameState.matchupIdx ? 'current' : '';
    return `<div class="round-dot ${cls}"></div>`;
  }).join('');

  return `
    <div class="screen stage">
      <div class="stage-frame">
        <div class="stage-label"><span>${round.title} — ${round.name}</span></div>
        <div class="round-progress">${dotsHtml}</div>
        <h2 class="matchup-question">${matchup.q}</h2>
        <div class="matchup-hint">
          ${myVote ? 'Vote cast. Tap a different villain to change your mind.' : 'Tap a villain to cast your vote.'}
        </div>
        <div class="matchup-grid">
          ${villainCardHtml(matchup.a, { size: 'lg', onClick: 'castVote', selected: myVote === matchup.a })}
          <div class="vs-ornament"><div class="vs-text">VS</div></div>
          ${villainCardHtml(matchup.b, { size: 'lg', onClick: 'castVote', selected: myVote === matchup.b })}
        </div>
      </div>
    </div>`;
}

function renderRoundEnd() {
  const round = ROUNDS[gameState.roundIdx];
  return `
    <div class="screen">
      <div class="vote-cast-overlay">
        <div class="vote-cast-eyebrow">${round ? round.title : 'Round'} Complete</div>
        <h2 class="vote-cast-title">Nicely done.</h2>
        <p class="vote-cast-hint">
          The host is moving to the next round.<br>Hang tight — your next question is on its way.
        </p>
      </div>
    </div>`;
}

function renderFinal() {
  const myVote = getMyVote('final');
  const cardsHtml = Object.keys(VILLAINS).map(id => villainCardHtml(id, {
    size: 'md',
    onClick: 'castFinalVote',
    selected: myVote === id,
  })).join('');

  return `
    <div class="screen stage">
      <div class="stage-frame">
        <div class="stage-label"><span>The Final Verdict</span></div>
        <h2 class="final-title">Who is the Ultimate Villain?</h2>
        <p class="final-subtitle">
          One final vote. Tap the villain who, after all of it, reigns supreme.
          ${myVote ? '<br><br><em>Your vote is in. You can change it before the host closes voting.</em>' : ''}
        </p>
        <div class="villain-gallery">${cardsHtml}</div>
      </div>
    </div>`;
}

function renderResults() {
  return `
    <div class="screen">
      <div class="vote-cast-overlay">
        <div class="crown">♛</div>
        <div class="vote-cast-eyebrow">The Verdict is In</div>
        <h2 class="vote-cast-title">The Ultimate Villain has been crowned.</h2>
        <p class="vote-cast-hint">Look to the host's screen for the final reveal.</p>
      </div>
    </div>`;
}

// ─── Kick off ─────────────────────────────────────────────────────────────
poll();
setInterval(poll, POLL_INTERVAL_VOTER);
</script>
</body>
</html>
